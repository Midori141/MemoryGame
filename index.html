<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>しんけいすずじゃく</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; touch-action: manipulation; }

        body {
            font-family: 'Segoe UI', 'Hiragino Sans', sans-serif;
            background: linear-gradient(135deg, #e0f2fe, #7dd3fc, #38bdf8);
            min-height: 100vh;
            min-height: 100dvh;
            color: #1e3a5f;
            display: flex;
            justify-content: center;
            align-items: flex-start;
            padding: env(safe-area-inset-top, 12px) 0 env(safe-area-inset-bottom, 12px);
        }

        #app {
            text-align: center;
            width: 100%;
            max-width: 900px;
            padding: 20px;
        }

        h1 {
            font-size: 2.4rem;
            margin-bottom: 10px;
            color: #0369a1;
            text-shadow: 0 2px 8px rgba(3,105,161,0.15);
        }

        /* スタート画面 */
        #start-screen { display: flex; flex-direction: column; align-items: center; gap: 20px; }
        #start-screen p { color: #0c4a6e; font-size: 1.05rem; }

        #start-screen input {
            font-size: 1.2rem;
            padding: 12px 24px;
            border: 2px solid #38bdf8;
            border-radius: 8px;
            background: rgba(255,255,255,0.7);
            color: #1e3a5f;
            text-align: center;
            width: 280px;
            outline: none;
        }
        #start-screen input::placeholder { color: rgba(30,58,95,0.4); }
        #start-screen input:focus { border-color: #0284c7; box-shadow: 0 0 10px rgba(2,132,199,0.3); }

        .btn {
            font-size: 1.1rem;
            padding: 12px 36px;
            border: none;
            border-radius: 8px;
            cursor: pointer;
            font-weight: bold;
            transition: transform 0.15s, box-shadow 0.15s;
        }
        .btn:hover { transform: translateY(-2px); box-shadow: 0 4px 15px rgba(0,0,0,0.15); }
        .btn:active { transform: translateY(0); }

        .btn-primary { background: linear-gradient(135deg, #0ea5e9, #0284c7); color: #fff; }
        .btn-secondary { background: linear-gradient(135deg, #7dd3fc, #38bdf8); color: #0c4a6e; }

        /* ゲーム画面 */
        #game-screen { display: none; }

        .game-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 16px;
            padding: 12px 20px;
            background: rgba(255,255,255,0.5);
            border-radius: 12px;
            flex-wrap: wrap;
            gap: 8px;
            backdrop-filter: blur(6px);
        }
        .game-header .info { font-size: 1rem; }
        .game-header .info span { font-weight: bold; color: #0369a1; }
        .timer { font-size: 1.4rem; font-weight: bold; color: #0369a1; }
        .timer.warning { color: #dc2626; animation: pulse 0.5s infinite alternate; }

        @keyframes pulse { to { opacity: 0.5; } }

        #board {
            display: grid;
            justify-content: center;
            margin: 0 auto;
        }

        .card {
            position: relative;
            cursor: pointer;
            perspective: 600px;
            aspect-ratio: 1;
        }
        .card-inner {
            width: 100%;
            height: 100%;
            position: relative;
            transform-style: preserve-3d;
            transition: transform 0.4s;
            border-radius: 10px;
        }
        .card.flipped .card-inner,
        .card.matched .card-inner { transform: rotateY(180deg); }
        .card.matched { pointer-events: none; }

        .card-front, .card-back {
            position: absolute;
            width: 100%;
            height: 100%;
            backface-visibility: hidden;
            border-radius: 10px;
            display: flex;
            align-items: center;
            justify-content: center;
            overflow: hidden;
        }
        .card-front {
            background: #fff;
            border: 2px solid #bae6fd;
        }
        .card-front img {
            width: 100%;
            height: 100%;
            object-fit: cover;
            border-radius: 8px;
        }
        .card-back {
            transform: rotateY(180deg);
            background: #fff;
            border: 2px solid #7dd3fc;
        }
        .card-back img {
            width: 100%;
            height: 100%;
            object-fit: cover;
            border-radius: 8px;
        }

        /* 結果画面 */
        #result-screen {
            display: none;
            flex-direction: column;
            align-items: center;
        }
        .result-box {
            background: rgba(255,255,255,0.6);
            border-radius: 16px;
            padding: 30px;
            margin: 20px 0;
            backdrop-filter: blur(6px);
        }
        .result-box.success { border: 2px solid #22c55e; }
        .result-box.fail { border: 2px solid #ef4444; }
        .result-score { font-size: 3rem; font-weight: bold; color: #0369a1; margin: 10px 0; }
        .result-detail { font-size: 1.1rem; color: #1e3a5f; margin: 6px 0; }

        /* ランキング */
        #ranking-screen {
            display: none;
            flex-direction: column;
            align-items: center;
        }
        .ranking-table {
            width: 100%;
            border-collapse: collapse;
            margin-top: 16px;
            background: rgba(255,255,255,0.5);
            border-radius: 12px;
            overflow: hidden;
        }
        .ranking-table th, .ranking-table td {
            padding: 10px 14px;
            text-align: center;
            border-bottom: 1px solid rgba(3,105,161,0.1);
        }
        .ranking-table th {
            background: rgba(14,165,233,0.15);
            font-size: 0.9rem;
            color: #0369a1;
        }
        .ranking-table tr:hover { background: rgba(255,255,255,0.3); }
        .ranking-table .rank-1 { color: #ca8a04; font-weight: bold; }
        .ranking-table .rank-2 { color: #6b7280; font-weight: bold; }
        .ranking-table .rank-3 { color: #b45309; font-weight: bold; }

        .btn-group { display: flex; gap: 12px; justify-content: center; margin-top: 20px; flex-wrap: wrap; }

        .screen-img {
            width: 60%;
            max-width: 280px;
            border-radius: 12px;
            margin: 8px 0;
        }

        .btn-group-vertical {
            display: flex;
            flex-direction: column;
            align-items: center;
            gap: 12px;
            margin-top: 20px;
            width: 100%;
        }
        .btn-group-vertical .btn { width: 80%; max-width: 300px; }
        .btn-tall { padding-top: 18px; padding-bottom: 18px; }

        .btn-toggle {
            margin-top: 16px;
            padding: 8px 20px;
            border: 1px solid rgba(3,105,161,0.3);
            border-radius: 20px;
            background: rgba(255,255,255,0.4);
            color: #0369a1;
            font-size: 0.9rem;
            cursor: pointer;
        }
        .btn-toggle.off {
            background: rgba(0,0,0,0.1);
            color: #6b7280;
        }

        .version-text {
            margin-top: 12px;
            font-size: 0.75rem;
            color: rgba(3,105,161,0.4);
        }

        /* スマホ向けレスポンシブ */
        @media (max-width: 600px) {
            h1 { font-size: 1.5rem; }
            #app { padding: 10px; }
            .game-header {
                flex-direction: column;
                padding: 8px 12px;
                gap: 4px;
                margin-bottom: 8px;
            }
            .game-header .info { font-size: 0.85rem; }
            .timer { font-size: 1.1rem; }
            .card-inner { border-radius: 6px; }
            .card-front, .card-back { border-radius: 6px; }
            .card-front img, .card-back img { border-radius: 4px; }
            .result-box { padding: 16px; margin: 12px 0; }
            .result-score { font-size: 2rem; }
            .result-detail { font-size: 0.95rem; }
            .btn { font-size: 1rem; padding: 10px 24px; }
            .btn-tall { padding-top: 15px; padding-bottom: 15px; }
            .btn-group-vertical .btn { width: 90%; }
            .ranking-table th, .ranking-table td { padding: 6px 4px; font-size: 0.8rem; }
            #start-screen input { width: 90%; max-width: 280px; }
            #start-screen p { font-size: 0.9rem; }
        }
    </style>

    <script src="https://www.gstatic.com/firebasejs/10.14.1/firebase-app-compat.js"></script>

    </script>
</head>
<body>
<div id="app">

    <!-- スタート画面 -->
    <div id="start-screen">
        <h1>🃏 しんけいすずじゃく</h1>
        <img src="images/top.jpg" alt="トップ画像" class="screen-img">
        <p>レベル1（2×2）からレベル6（6×8）まで挑戦しよう</p>
        <input type="text" id="nickname-input" placeholder="あだ名を入力してね" maxlength="12" aria-label="あだ名">
        <div class="btn-group-vertical">
            <button class="btn btn-primary" onclick="startGame()">ゲームスタート</button>
            <button class="btn btn-secondary" onclick="showRanking()">👑 ランキング</button>
        </div>
        <button class="btn-toggle" id="bgm-toggle" onclick="toggleBGM()">🔊 BGM ON</button>
        <p class="version-text">Ver1-2</p>
    </div>

    <!-- ゲーム画面 -->
    <div id="game-screen">
        <div class="game-header">
            <div class="info">プレイヤー: <span id="player-name"></span></div>
            <div class="info">レベル <span id="level-display"></span>（<span id="grid-display"></span>）</div>
            <div class="info">スコア: <span id="score-display">0</span></div>
            <div class="timer" id="timer-display">--:--</div>
        </div>
        <div id="board"></div>
    </div>

    <!-- 結果画面 -->
    <div id="result-screen">
        <h1 id="result-title"></h1>
        <img id="result-img" src="" alt="" class="screen-img">
        <div class="btn-group-vertical">
            <button class="btn btn-primary btn-tall" id="result-action-btn"></button>
        </div>
        <div class="result-box" id="result-box">
            <div class="result-score" id="result-score-text"></div>
            <div class="result-detail" id="result-detail"></div>
            <div class="result-detail" id="result-level-detail"></div>
        </div>
        <div class="btn-group-vertical">
            <button class="btn btn-secondary btn-tall" onclick="showRanking()">👑 ランキング</button>
            <button class="btn btn-secondary btn-tall" onclick="goToStart()">タイトルへ</button>
        </div>
    </div>

    <!-- ランキング画面 -->
    <div id="ranking-screen">
        <h1>🏆 ランキング TOP20</h1>
        <table class="ranking-table">
            <thead>
                <tr><th>順位</th><th>名前</th><th>到達レベル</th><th>スコア</th><th>日時</th></tr>
            </thead>
            <tbody id="ranking-body"></tbody>
        </table>
        <div class="btn-group-vertical">
            <button class="btn btn-primary" onclick="goToStart()">タイトルへ</button>
        </div>
    </div>
</div>

<script>
    // ===== サウンド管理（Web Audio API） =====
    const AudioCtx = window.AudioContext || window.webkitAudioContext;
    let audioCtx = null;
    let bgmEnabled = true;

    function ensureAudioCtx() {
        if (!audioCtx) audioCtx = new AudioCtx();
        if (audioCtx.state === 'suspended') audioCtx.resume();
    }

    // iOS Safari対策: 最初のタッチでAudioContextを初期化
    function initAudioOnTouch() {
        ensureAudioCtx();
        // 無音を再生してロック解除
        const osc = audioCtx.createOscillator();
        const gain = audioCtx.createGain();
        osc.connect(gain);
        gain.connect(audioCtx.destination);
        gain.gain.value = 0;
        osc.start();
        osc.stop(audioCtx.currentTime + 0.01);
        // AudioContext初期化後にトップBGMを開始
        setTimeout(() => startTopBGM(), 100);
        document.removeEventListener('touchstart', initAudioOnTouch);
        document.removeEventListener('click', initAudioOnTouch);
    }
    document.addEventListener('touchstart', initAudioOnTouch, { once: true });
    document.addEventListener('click', initAudioOnTouch, { once: true });

    function toggleBGM() {
        bgmEnabled = !bgmEnabled;
        const btn = document.getElementById('bgm-toggle');
        if (bgmEnabled) {
            btn.textContent = '🔊 BGM ON';
            btn.classList.remove('off');
            startTopBGM();
        } else {
            btn.textContent = '🔇 BGM OFF';
            btn.classList.add('off');
            stopBGM();
            stopTopBGM();
        }
    }

    // カードめくり効果音
    function playFlipSound() {
        ensureAudioCtx();
        if (audioCtx.state !== 'running') { audioCtx.resume(); return; }
        const osc = audioCtx.createOscillator();
        const gain = audioCtx.createGain();
        osc.connect(gain);
        gain.connect(audioCtx.destination);
        osc.type = 'sine';
        osc.frequency.setValueAtTime(800, audioCtx.currentTime);
        osc.frequency.exponentialRampToValueAtTime(1200, audioCtx.currentTime + 0.08);
        gain.gain.setValueAtTime(0.15, audioCtx.currentTime);
        gain.gain.exponentialRampToValueAtTime(0.001, audioCtx.currentTime + 0.12);
        osc.start(audioCtx.currentTime);
        osc.stop(audioCtx.currentTime + 0.12);
    }

    // ペア成功音
    function playMatchSound() {
        ensureAudioCtx();
        if (audioCtx.state !== 'running') { audioCtx.resume(); return; }
        // 心地よいキラキラ和音
        const chords = [
            { freq: 523, delay: 0 },
            { freq: 659, delay: 0.08 },
            { freq: 784, delay: 0.16 },
            { freq: 1047, delay: 0.24 }
        ];
        chords.forEach(({ freq, delay }) => {
            const osc = audioCtx.createOscillator();
            const gain = audioCtx.createGain();
            osc.connect(gain);
            gain.connect(audioCtx.destination);
            osc.type = 'sine';
            osc.frequency.value = freq;
            gain.gain.setValueAtTime(0, audioCtx.currentTime + delay);
            gain.gain.linearRampToValueAtTime(0.12, audioCtx.currentTime + delay + 0.03);
            gain.gain.exponentialRampToValueAtTime(0.001, audioCtx.currentTime + delay + 0.4);
            osc.start(audioCtx.currentTime + delay);
            osc.stop(audioCtx.currentTime + delay + 0.4);
        });
    }

    // ミスマッチ音
    function playMissSound() {
        ensureAudioCtx();
        if (audioCtx.state !== 'running') { audioCtx.resume(); return; }
        const osc = audioCtx.createOscillator();
        const gain = audioCtx.createGain();
        osc.connect(gain);
        gain.connect(audioCtx.destination);
        osc.type = 'triangle';
        osc.frequency.setValueAtTime(300, audioCtx.currentTime);
        osc.frequency.exponentialRampToValueAtTime(150, audioCtx.currentTime + 0.2);
        gain.gain.setValueAtTime(0.1, audioCtx.currentTime);
        gain.gain.exponentialRampToValueAtTime(0.001, audioCtx.currentTime + 0.25);
        osc.start(audioCtx.currentTime);
        osc.stop(audioCtx.currentTime + 0.25);
    }

    // BGM（ループ再生）
    let bgmOscillators = [];
    let bgmInterval = null;

    function startBGM() {
        stopBGM();
        if (!bgmEnabled) return;
        ensureAudioCtx();
        // iOSではresumeが非同期なので完了を待ってから再生開始
        const doStart = () => {
            // 軽やかなアルペジオBGM
            const notes = [523, 587, 659, 784, 659, 587, 523, 440, 494, 523, 659, 784, 880, 784, 659, 523];
            let noteIndex = 0;

            bgmInterval = setInterval(() => {
                if (!audioCtx || audioCtx.state !== 'running') return;
                const osc = audioCtx.createOscillator();
                const gain = audioCtx.createGain();
                osc.connect(gain);
                gain.connect(audioCtx.destination);
                osc.type = 'sine';
                osc.frequency.value = notes[noteIndex % notes.length];
                gain.gain.setValueAtTime(0.04, audioCtx.currentTime);
                gain.gain.exponentialRampToValueAtTime(0.001, audioCtx.currentTime + 0.3);
                osc.start(audioCtx.currentTime);
                osc.stop(audioCtx.currentTime + 0.35);
                bgmOscillators.push(osc);
                noteIndex++;
            }, 280);
        };

        if (audioCtx.state === 'suspended') {
            audioCtx.resume().then(doStart);
        } else {
            doStart();
        }
    }

    function stopBGM() {
        if (bgmInterval) { clearInterval(bgmInterval); bgmInterval = null; }
        bgmOscillators.forEach(o => { try { o.stop(); } catch(e) {} });
        bgmOscillators = [];
    }

    // トップ画面用BGM（ゆったりしたアンビエント）
    let topBgmInterval = null;
    let topBgmOscillators = [];

    function startTopBGM() {
        stopTopBGM();
        if (!bgmEnabled) return;
        ensureAudioCtx();
        const doStart = () => {
            const notes = [262, 330, 392, 330, 294, 349, 440, 349, 262, 330, 392, 523, 440, 349, 330, 294];
            let noteIndex = 0;
            topBgmInterval = setInterval(() => {
                if (!audioCtx || audioCtx.state !== 'running') return;
                const osc = audioCtx.createOscillator();
                const gain = audioCtx.createGain();
                osc.connect(gain);
                gain.connect(audioCtx.destination);
                osc.type = 'sine';
                osc.frequency.value = notes[noteIndex % notes.length];
                gain.gain.setValueAtTime(0.025, audioCtx.currentTime);
                gain.gain.exponentialRampToValueAtTime(0.001, audioCtx.currentTime + 0.6);
                osc.start(audioCtx.currentTime);
                osc.stop(audioCtx.currentTime + 0.65);
                topBgmOscillators.push(osc);
                noteIndex++;
            }, 500);
        };
        if (audioCtx.state === 'suspended') {
            audioCtx.resume().then(doStart);
        } else {
            doStart();
        }
    }

    function stopTopBGM() {
        if (topBgmInterval) { clearInterval(topBgmInterval); topBgmInterval = null; }
        topBgmOscillators.forEach(o => { try { o.stop(); } catch(e) {} });
        topBgmOscillators = [];
    }

    // レベルクリア時のファンファーレ
    function playClearFanfare() {
        ensureAudioCtx();
        if (audioCtx.state !== 'running') return;
        const melody = [
            { freq: 523, time: 0, dur: 0.15 },
            { freq: 659, time: 0.12, dur: 0.15 },
            { freq: 784, time: 0.24, dur: 0.15 },
            { freq: 1047, time: 0.36, dur: 0.3 },
            { freq: 880, time: 0.56, dur: 0.12 },
            { freq: 1047, time: 0.68, dur: 0.5 }
        ];
        melody.forEach(({ freq, time, dur }) => {
            const osc = audioCtx.createOscillator();
            const gain = audioCtx.createGain();
            osc.connect(gain);
            gain.connect(audioCtx.destination);
            osc.type = 'square';
            osc.frequency.value = freq;
            gain.gain.setValueAtTime(0, audioCtx.currentTime + time);
            gain.gain.linearRampToValueAtTime(0.08, audioCtx.currentTime + time + 0.02);
            gain.gain.exponentialRampToValueAtTime(0.001, audioCtx.currentTime + time + dur);
            osc.start(audioCtx.currentTime + time);
            osc.stop(audioCtx.currentTime + time + dur);
        });
    }

    // ===== ゲーム状態 =====
    const STATE = {
        nickname: '',
        level: 1,
        totalScore: 0,
        timeLeft: 0,
        timerId: null,
        firstCard: null,
        secondCard: null,
        lockBoard: false,
        matchedPairs: 0,
        totalPairs: 0,
        usedImages: []
    };

    // レベル設定: Lv1→2×2(2ペア), Lv2→2×4(4ペア), Lv3→3×5(7ペア+ダミー1), Lv4→4×6(12ペア), Lv5→4×8(16ペア)
    // 制限時間: レベル×1分
    const LEVEL_CONFIGS = [
        null,
        { cols: 2, rows: 2, timeLimit: 60 },   // Lv1: 4枚 = 2ペア
        { cols: 2, rows: 4, timeLimit: 120 },   // Lv2: 8枚 = 4ペア
        { cols: 4, rows: 4, timeLimit: 180 },   // Lv3: 16枚 = 8ペア
        { cols: 4, rows: 6, timeLimit: 240 },   // Lv4: 24枚 = 12ペア
        { cols: 4, rows: 8, timeLimit: 300 },   // Lv5: 32枚 = 16ペア
        { cols: 6, rows: 8, timeLimit: 360 },   // Lv6: 48枚 = 24ペア
    ];

    function getLevelConfig(level) {
        const cfg = LEVEL_CONFIGS[level];
        const totalSlots = cfg.cols * cfg.rows;
        const pairCount = Math.floor(totalSlots / 2);
        const hasDummy = totalSlots % 2 !== 0;
        return { cols: cfg.cols, rows: cfg.rows, pairCount, hasDummy, timeLimit: cfg.timeLimit };
    }

    // ===== 画面切り替え =====
    function showScreen(id) {
        ['start-screen', 'game-screen', 'result-screen', 'ranking-screen']
            .forEach(s => document.getElementById(s).style.display = 'none');
        document.getElementById(id).style.display = id === 'game-screen' ? 'block' : 'flex';
    }

    function goToStart() {
        stopTimer();
        stopBGM();
        startTopBGM();
        showScreen('start-screen');
    }

    // ===== ゲーム開始 =====
    function startGame() {
        // LINEブラウザ等でも確実に音を鳴らすためユーザー操作時にAudioContext初期化
        ensureAudioCtx();
        if (audioCtx.state === 'suspended') audioCtx.resume();
        stopTopBGM();

        const input = document.getElementById('nickname-input');
        const name = input.value.trim();
        if (!name) {
            input.focus();
            input.style.borderColor = '#ef4444';
            setTimeout(() => input.style.borderColor = '#38bdf8', 1500);
            return;
        }
        STATE.nickname = name;
        STATE.level = 1;
        STATE.totalScore = 0;
        STATE.usedImages = [];
        startLevel();
    }

    function startLevel() {
        const config = getLevelConfig(STATE.level);

        document.getElementById('player-name').textContent = STATE.nickname;
        document.getElementById('level-display').textContent = STATE.level;
        document.getElementById('grid-display').textContent = `${config.cols}×${config.rows}`;
        document.getElementById('score-display').textContent = STATE.totalScore;

        STATE.matchedPairs = 0;
        STATE.totalPairs = config.pairCount;
        STATE.firstCard = null;
        STATE.secondCard = null;
        STATE.lockBoard = false;

        const cards = generateCards(config.pairCount, config.hasDummy);
        renderBoard(cards, config.cols, config.rows);

        STATE.timeLeft = config.timeLimit;
        updateTimerDisplay();
        showScreen('game-screen');
        startTimer();
        startBGM();
    }

    // ===== カード生成 =====
    function generateCards(pairCount, hasDummy) {
        let available = [];
        for (let i = 1; i <= 66; i++) {
            if (!STATE.usedImages.includes(i)) available.push(i);
        }
        if (available.length < pairCount) {
            STATE.usedImages = [];
            available = [];
            for (let i = 1; i <= 66; i++) available.push(i);
        }
        shuffleArray(available);
        const selected = available.slice(0, pairCount);
        STATE.usedImages = STATE.usedImages.concat(selected);

        let cardList = [];
        selected.forEach(n => { cardList.push(n); cardList.push(n); });
        if (hasDummy) cardList.push(-1);
        shuffleArray(cardList);
        return cardList;
    }

    function shuffleArray(arr) {
        for (let i = arr.length - 1; i > 0; i--) {
            const j = Math.floor(Math.random() * (i + 1));
            [arr[i], arr[j]] = [arr[j], arr[i]];
        }
    }

    // ===== ボード描画 =====
    function renderBoard(cards, cols, rows) {
        const board = document.getElementById('board');
        board.innerHTML = '';

        // 利用可能な領域を計算（iPhone safe area考慮）
        const gap = window.innerWidth <= 430 ? 4 : 6;
        const sidePad = window.innerWidth <= 430 ? 12 : 20;
        const screenW = window.innerWidth - sidePad * 2;
        // ヘッダー + 上下余白を引いた高さ
        const headerH = window.innerWidth <= 430 ? 70 : 80;
        const screenH = (window.visualViewport ? window.visualViewport.height : window.innerHeight) - headerH - 24;

        const maxCardW = Math.floor((screenW - (cols - 1) * gap) / cols);
        const maxCardH = Math.floor((screenH - (rows - 1) * gap) / rows);
        const cardSize = Math.min(maxCardW, maxCardH, 120);

        board.style.gridTemplateColumns = `repeat(${cols}, ${cardSize}px)`;
        board.style.gridTemplateRows = `repeat(${rows}, ${cardSize}px)`;
        board.style.gap = `${gap}px`;

        cards.forEach((imgNum, index) => {
            if (imgNum === -1) {
                const dummy = document.createElement('div');
                dummy.className = 'card matched';
                dummy.style.visibility = 'hidden';
                board.appendChild(dummy);
                return;
            }

            const card = document.createElement('div');
            card.className = 'card';
            card.dataset.image = imgNum;
            card.dataset.index = index;
            card.setAttribute('role', 'button');
            card.setAttribute('aria-label', `カード ${index + 1}`);
            card.setAttribute('tabindex', '0');

            card.innerHTML = `
                <div class="card-inner">
                    <div class="card-front">
                        <img src="images/card.jpg" alt="カード裏面" draggable="false"
                             onerror="this.style.display='none'; this.parentElement.style.background='linear-gradient(135deg,#0ea5e9,#38bdf8)'; this.parentElement.innerHTML+='<span style=\\'color:#fff;font-size:2rem\\'>?</span>'">
                    </div>
                    <div class="card-back">
                        <img src="images/スライド${imgNum}.JPG" alt="画像${imgNum}" draggable="false"
                             onerror="this.parentElement.innerHTML='<div style=\\'display:flex;align-items:center;justify-content:center;width:100%;height:100%;background:#0ea5e9;color:#fff;font-size:1.5rem;border-radius:8px;\\'>${imgNum}</div>'">
                    </div>
                </div>
            `;

            card.addEventListener('click', () => flipCard(card));
            card.addEventListener('keydown', (e) => {
                if (e.key === 'Enter' || e.key === ' ') { e.preventDefault(); flipCard(card); }
            });
            board.appendChild(card);
        });
    }

    // ===== カードめくりロジック =====
    function flipCard(card) {
        if (STATE.lockBoard) return;
        if (card.classList.contains('flipped') || card.classList.contains('matched')) return;

        card.classList.add('flipped');
        playFlipSound();

        if (!STATE.firstCard) {
            STATE.firstCard = card;
            return;
        }

        STATE.secondCard = card;
        STATE.lockBoard = true;
        checkMatch();
    }

    function checkMatch() {
        const isMatch = STATE.firstCard.dataset.image === STATE.secondCard.dataset.image;

        if (isMatch) {
            STATE.firstCard.classList.add('matched');
            STATE.secondCard.classList.add('matched');
            STATE.matchedPairs++;
            playMatchSound();
            resetSelection();
            if (STATE.matchedPairs === STATE.totalPairs) levelClear();
        } else {
            playMissSound();
            setTimeout(() => {
                STATE.firstCard.classList.remove('flipped');
                STATE.secondCard.classList.remove('flipped');
                resetSelection();
            }, 800);
        }
    }

    function resetSelection() {
        STATE.firstCard = null;
        STATE.secondCard = null;
        STATE.lockBoard = false;
    }

    // ===== タイマー =====
    function startTimer() {
        stopTimer();
        STATE.timerId = setInterval(() => {
            STATE.timeLeft--;
            updateTimerDisplay();
            if (STATE.timeLeft <= 0) { stopTimer(); gameOver(); }
        }, 1000);
    }

    function stopTimer() {
        if (STATE.timerId) { clearInterval(STATE.timerId); STATE.timerId = null; }
    }

    function updateTimerDisplay() {
        const min = Math.floor(STATE.timeLeft / 60);
        const sec = STATE.timeLeft % 60;
        const display = document.getElementById('timer-display');
        display.textContent = `${min}:${sec.toString().padStart(2, '0')}`;
        display.classList.toggle('warning', STATE.timeLeft <= 30);
    }

    // ===== レベルクリア =====
    function levelClear() {
        stopTimer();
        stopBGM();
        playClearFanfare();
        const levelScore = STATE.timeLeft * Math.pow(10, STATE.level - 1);
        STATE.totalScore += levelScore;

        // レベルクリアごとにランキング保存（途中離脱対策）
        saveRankingProgress();

        if (STATE.level >= 6) {
            showResult(true, levelScore, true);
        } else {
            showResult(true, levelScore, false);
        }
    }

    // ===== ゲームオーバー =====
    function gameOver() {
        stopTimer();
        stopBGM();
        saveRanking();
        showResult(false, 0, false);
    }

    // ===== 結果表示 =====
    function showResult(cleared, levelScore, allClear) {
        const box = document.getElementById('result-box');
        const title = document.getElementById('result-title');
        const scoreText = document.getElementById('result-score-text');
        const detail = document.getElementById('result-detail');
        const levelDetail = document.getElementById('result-level-detail');
        const actionBtn = document.getElementById('result-action-btn');
        const resultImg = document.getElementById('result-img');

        if (cleared) {
            box.className = 'result-box success';
            if (allClear) {
                // 全クリア時はまず保存してから新記録チェック
                checkNewRecordAndShow(levelScore, true, resultImg, title, scoreText, detail, levelDetail, actionBtn);
            } else {
                // レベルクリア
                resultImg.src = 'images/clear.jpg';
                resultImg.alt = 'クリア';
                title.textContent = `🍒 レベル${STATE.level} クリア！`;
                scoreText.textContent = `+${levelScore} ポイント`;
                detail.textContent = `残り${STATE.timeLeft}秒 × レベル${STATE.level} = ${levelScore}ポイント`;
                levelDetail.textContent = `合計スコア: ${STATE.totalScore}`;
                actionBtn.textContent = `次のレベルへ → レベル${STATE.level + 1}`;
                actionBtn.onclick = () => { STATE.level++; startLevel(); };
            }
        } else {
            // タイムアップ
            box.className = 'result-box fail';
            resultImg.src = 'images/time_up.jpg';
            resultImg.alt = 'タイムアップ';
            title.textContent = '💀 タイムアップ！';
            scoreText.textContent = `最終スコア: ${STATE.totalScore}`;
            detail.textContent = `レベル${STATE.level}（${getLevelConfig(STATE.level).cols}×${getLevelConfig(STATE.level).rows}）で時間切れ`;
            levelDetail.textContent = 'レベル1からやり直し！';
            actionBtn.textContent = 'もう一度チャレンジ';
            actionBtn.onclick = () => { STATE.level = 1; STATE.totalScore = 0; STATE.usedImages = []; startLevel(); };
        }
        showScreen('result-screen');
    }

    // 新記録チェック（Firebaseから現在の1位スコアを取得して比較）
    function checkNewRecordAndShow(levelScore, allClear, resultImg, title, scoreText, detail, levelDetail, actionBtn) {
        db.ref('ranking').orderByChild('score').limitToLast(1).once('value', snapshot => {
            let topScore = 0;
            snapshot.forEach(child => { topScore = child.val().score; });

            const isNewRecord = STATE.totalScore > topScore;

            if (isNewRecord) {
                resultImg.src = 'images/new_record.jpg';
                resultImg.alt = '新記録';
                title.textContent = '🏆 新記録！おめでとう！';
            } else {
                resultImg.src = 'images/clear.jpg';
                resultImg.alt = 'クリア';
                title.textContent = '🎉 全レベルクリア！おめでとう！';
            }

            scoreText.textContent = `合計スコア: ${STATE.totalScore}`;
            detail.textContent = `レベル${STATE.level}クリア → +${levelScore}ポイント（残り${STATE.timeLeft}秒 × レベル${STATE.level}）`;
            levelDetail.textContent = allClear ? '全6レベル制覇！素晴らしい！' : '';
            saveRanking();
            actionBtn.textContent = 'タイトルへ戻る';
            actionBtn.onclick = goToStart;
        }).catch(() => {
            // Firebase取得失敗時はクリア画像で表示
            resultImg.src = 'images/clear.jpg';
            resultImg.alt = 'クリア';
            title.textContent = '🎉 全レベルクリア！おめでとう！';
            scoreText.textContent = `合計スコア: ${STATE.totalScore}`;
            detail.textContent = `レベル${STATE.level}クリア → +${levelScore}ポイント`;
            levelDetail.textContent = '全6レベル制覇！素晴らしい！';
            saveRanking();
            actionBtn.textContent = 'タイトルへ戻る';
            actionBtn.onclick = goToStart;
        });
    }

    // ===== ランキング（Firebase Realtime Database） =====
    let progressKey = null; // 途中経過保存のFirebaseキー

    // 途中経過保存（レベルクリアごとに呼ばれる、前回の途中保存を上書き）
    function saveRankingProgress() {
        const entry = {
            name: STATE.nickname,
            score: STATE.totalScore,
            level: STATE.level,
            date: new Date().toLocaleString('ja-JP')
        };
        // 前回の途中保存があれば削除
        if (progressKey) {
            db.ref('ranking/' + progressKey).remove();
        }
        // 新しい途中保存
        db.ref('ranking').push(entry).then(ref => {
            progressKey = ref.key;
        }).catch(err => {
            console.error('途中保存エラー:', err);
        });
    }

    // 最終保存（全クリアまたはゲームオーバー時）
    function saveRanking() {
        hasSavedOnExit = true;
        // 途中保存があれば削除（最終結果で上書きするため）
        if (progressKey) {
            db.ref('ranking/' + progressKey).remove();
            progressKey = null;
        }
        const entry = {
            name: STATE.nickname,
            score: STATE.totalScore,
            level: STATE.level,
            date: new Date().toLocaleString('ja-JP')
        };
        db.ref('ranking').push(entry).then(() => {
            trimRanking();
        }).catch(err => {
            console.error('ランキング保存エラー:', err);
        });
    }

    function trimRanking() {
        db.ref('ranking').orderByChild('score').once('value', snapshot => {
            const entries = [];
            snapshot.forEach(child => {
                entries.push({ key: child.key, score: child.val().score });
            });
            // スコア降順ソート
            entries.sort((a, b) => b.score - a.score);
            // 21位以降を削除
            if (entries.length > 20) {
                const removes = entries.slice(20);
                const updates = {};
                removes.forEach(e => { updates[e.key] = null; });
                db.ref('ranking').update(updates);
            }
        });
    }

    function showRanking() {
        stopBGM();
        stopTopBGM();
        const tbody = document.getElementById('ranking-body');
        tbody.innerHTML = '<tr><td colspan="5" style="padding:30px;color:rgba(30,58,95,0.5);">読み込み中...</td></tr>';
        showScreen('ranking-screen');

        db.ref('ranking').orderByChild('score').once('value', snapshot => {
            const ranking = [];
            snapshot.forEach(child => {
                ranking.push(child.val());
            });
            // スコア降順
            ranking.sort((a, b) => b.score - a.score);
            const top20 = ranking.slice(0, 20);

            tbody.innerHTML = '';
            if (top20.length === 0) {
                tbody.innerHTML = '<tr><td colspan="5" style="padding:30px;color:rgba(30,58,95,0.5);">まだ記録がありません</td></tr>';
            } else {
                top20.forEach((entry, i) => {
                    const rankClass = i < 3 ? `rank-${i + 1}` : '';
                    const medal = ['🥇', '🥈', '🥉'][i] || `${i + 1}`;
                    tbody.innerHTML += `
                        <tr class="${rankClass}">
                            <td>${medal}</td>
                            <td>${escapeHtml(entry.name)}</td>
                            <td>Lv.${entry.level}</td>
                            <td>${entry.score.toLocaleString()}</td>
                            <td style="font-size:0.85rem">${entry.date}</td>
                        </tr>`;
                });
            }
        }).catch(err => {
            console.error('ランキング取得エラー:', err);
            tbody.innerHTML = '<tr><td colspan="5" style="padding:30px;color:#ef4444;">読み込みに失敗しました</td></tr>';
        });
    }

    // ===== ブラウザ離脱時の処理 =====
    // レベルクリアごとにFirebaseに保存済みなので、離脱時の追加保存は不要
    // progressKeyが残っている場合はそのまま残る（=途中スコアがランキングに残る）
    let hasSavedOnExit = false;

    function escapeHtml(str) {
        const div = document.createElement('div');
        div.textContent = str;
        return div.innerHTML;
    }
</script>
